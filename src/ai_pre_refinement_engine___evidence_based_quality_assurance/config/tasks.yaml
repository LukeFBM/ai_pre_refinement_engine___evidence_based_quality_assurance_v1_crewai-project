quality_gate_citations_assumption_detection:
  description: "Execute rigorous multi-layer validation with **FAIL CONDITIONS** for
    {feature_idea} analysis, including citation verification, path/module validation,
    contradiction detection, confidence-evidence alignment, and **ASSUMPTION DETECTION**
    to prevent spec hallucination. Enforce quality standards that can halt the automation
    if critical issues are found.\n\n**CORE VALIDATION LAYERS:**\n\n**1) CITATION
    COMPLETENESS AUDIT:**\n- Every technical claim must reference specific files/lines/commits\n-
    All file paths must use `repo@ref:path` format (e.g., `group/api-core@main:src/search.rb`)\n-
    No invented or non-existent references\n- Path/module verification against actual
    repository structure\n\n**2) ASSUMPTION DETECTION & SPEC HALLUCINATION PREVENTION:**\n**FAIL
    CONDITIONS:**\n- Any numeric threshold/guardrail stated as fact unless it appears
    in:\n  a) The {feature_idea} input requirements, OR\n  b) Evidence from repository
    code (config files, constants, etc.)\n\n**Examples of FORBIDDEN spec hallucination:**\n-
    \"Rate limit of 100 requests/minute\" (unless found in code/config)  \n- \"Maximum
    50 neighborhoods per search\" (unless specified in input)\n- \"Timeout after 30
    seconds\" (unless discovered in existing code)\n- \"Cache TTL of 1 hour\" (unless
    found in configuration files)\n\n**REQUIRED REWRITE for non-evidenced thresholds:**\n```\n❌
    BEFORE: \"Implement rate limiting at 100 requests/minute\"\n✅ AFTER: \"Implement
    rate limiting (ASSUMPTION: 100 req/min - Product decision needed)\"\n\n❌ BEFORE:
    \"Search results limited to 50 items maximum\"  \n✅ AFTER: \"Search results pagination
    (ASSUMPTION: 50 item limit - Engineering verification needed)\"\n```\n\n**3) CONTRADICTION
    DETECTION:**\n- Consistency across all analysis phases\n- Technical claims that
    conflict with evidence\n- Confidence levels that don't match evidence strength\n\n**4)
    CONFIDENCE CALIBRATION:**\n- High confidence requires substantial proof\n- Evidence
    must support stated confidence levels  \n- Overconfidence prevention (high confidence
    without substantial backing)\n\n**5) EVIDENCE-CLAIM ALIGNMENT:**\n- Every complexity
    score must have evidence justification\n- Implementation approaches must be backed
    by repository patterns\n- Risk assessments must reference actual code/architecture
    findings\n\n**VALIDATION OUTPUTS:**\n\n**PASS SCENARIO:**\n- All file paths in
    `repo@ref:path` format\n- All numeric thresholds either evidenced or marked as
    assumptions\n- Citations complete and verifiable\n- Confidence levels match evidence
    strength\n- No logical contradictions\n\n**FAIL SCENARIO - ASSUMPTION VIOLATIONS:**\n-
    Numeric thresholds presented as facts without evidence\n- Missing `ASSUMPTION:`
    prefixes where required\n- Spec details not backed by input or repository findings\n\n**FAIL
    SCENARIO - CITATION VIOLATIONS:**  \n- File paths without proper `repo@ref:path`
    format\n- References to non-existent files or modules\n- Technical claims without
    repository evidence\n\n**REMEDIATION AUTHORITY:**\n- **VETO POWER** over entire
    analysis if quality standards aren't met\n- Authority to **FAIL THE ENTIRE RUN**
    for critical validation issues\n- For low-confidence conclusions, mandate follow-up
    investigation requirements\n- Force assumption marking and decision owner identification"
  expected_output: "**VALIDATION DECISION: PASS/FAIL**\n\n## Citation Audit Results\n```\n✅
    File Path Format: 47/47 paths use repo@ref:path format  \n✅ Path Verification:
    All referenced files exist in repositories\n✅ Citation Coverage: 94% of technical
    claims have backing evidence\n❌ Missing Citations: 3 complexity scores lack evidence
    justification\n```\n\n## Assumption Detection Results  \n```\n❌ SPEC HALLUCINATION
